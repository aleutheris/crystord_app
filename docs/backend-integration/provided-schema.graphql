schema {
    query: Query
    mutation: Mutation
}

scalar JSON

type Query {
    retrieve(labels: [String], uuid: String): [AtomOutput!]
    getGoogleClientID: String!
    signin(email: String!, password: String!): String!
    signinGoogle(idToken: String!): String!
    list_labels(labels_prefix: String!): [String!]!
    schemaInfo: SchemaInfo!
    discoverOperations(prefix: String, limit: Int): [OperationFunction!]!
}

type SchemaInfo {
    schemaVersion: String!
    schemaHash: String!
    releasedAt: String!
}

type OperationFunction {
    name: String!
    description: String
}

type Mutation {
    signup(email: String!, password: String!, username: String): String!
    change(selector: Selector, inputs: [AtomInput]!): [String]!
    destroy(selector: DestroySelector!): DestroyOutcome!
}

type DestroyOutcome {
    requested: [String!]!
    deleted: [String!]!
    notFound: [String!]!
}

input Selector {
    labels: [String]
    uuid: String
    title: String
    content: String
    description: String
    operation: String
    constants: JSON
    uuids: [String]
}

input DestroySelector {
    uuid: String
    uuids: [String]
}

input AtomInput {
    labels: [String!]!
    bonds: [BondInput]
    properties: PropertiesInput
}

input BondInput {
    uuid: ID!
    name: String!
    direction: String!
}

input PropertiesInput {
    shellies: ShelliesInput
    nuclearies: NucleariesInput
}

input ShelliesInput {
    uuid: ID
}

input ChangeInput {
    date: String
    description: String
}

input NucleariesInput {
    title: String
    content: String
    description: String
    operation: String
    constants: JSON
    declaredType: String
    typeMode: String
}

type AtomOutput {
    labels: [String]
    bonds: [BondOutput]
    properties: PropertiesOutput
    errorCode: String
    evaluationStatus: String
    cycleNodes: [String]
    cycleEdges: JSON
    originNodeUuid: String
    affectedNodeUuid: String
    causes: [String]
}

type BondOutput {
    uuid: ID!
    name: String!
    direction: String!
    required: Boolean
}

type PropertiesOutput {
    shellies: ShelliesOutput
    nuclearies: NucleariesOutput
}

type ShelliesOutput {
    uuid: ID!
    changes: [ChangeOutput!]
}

type ChangeOutput {
    date: String
    description: String!
}

type NucleariesOutput {
    title: String!
    content: String
    description: String
    operation: String
    constants: JSON
    declaredType: String
    effectiveType: String
    typeMode: String
    typeState: String
}
