# Client-approved GraphQL operations
#
# Keep only operations this client actually uses.
# This file acts as an allowlist and integration contract from the client side.

query StartupSchemaInfo {
  schemaInfo {
    schemaVersion
    schemaHash
    releasedAt
  }
}

query SignIn($email: String!, $password: String!) {
  signin(email: $email, password: $password)
}

query RetrieveByUuid($uuid: String!) {
  retrieve(uuid: $uuid) {
    labels
    bonds {
      uuid
      name
      direction
    }
    properties {
      shellies {
        uuid
      }
      nuclearies {
        title
        description
        content
        operation
        constants
      }
    }
  }
}

query ListLabels($prefix: String!) {
  list_labels(labels_prefix: $prefix)
}

mutation ChangeAtoms($selector: Selector, $inputs: [AtomInput]!) {
  change(selector: $selector, inputs: $inputs)
}

mutation DestroyAtoms($selector: Selector!) {
  destroy(selector: $selector)
}
