name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      # CI=true is set by GitHub Actions, so `npm run build` generates dist/config.json
      # from deploy_config.json's `deployProfile` (production), never the local `active`.
      - name: Build
        run: npm run build
        env:
          VITE_NETWORK_VIEW_ENABLED: ${{ vars.VITE_NETWORK_VIEW_ENABLED }}

      - name: Verify deploy config
        run: |
          echo "Deploying with config.json:"
          cat dist/config.json
          if grep -Eq 'localhost|127\.0\.0\.1' dist/config.json; then
            echo "::error::Refusing to deploy: config.json points at a local endpoint."
            exit 1
          fi

      - uses: actions/configure-pages@v6
        with:
          enablement: false

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - uses: actions/deploy-pages@v5
        id: deployment
