name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_NETWORK_VIEW_ENABLED: ${{ vars.VITE_NETWORK_VIEW_ENABLED }}

      - name: Write runtime config
        run: |
          ACTIVE=$(jq -r '.active' deploy_config.json)
          jq --arg s "$ACTIVE" '.servers[$s]' deploy_config.json > dist/config.json
          echo "Deployed with server: $ACTIVE"

      - uses: actions/configure-pages@v6
        with:
          enablement: false

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - uses: actions/deploy-pages@v5
        id: deployment
